    font-family:'Noto Serif Thai', serif; font-size: 15px; font-weight:600;
    color: var(--hojicha-deep); margin: 0 0 14px; display:flex; align-items:center; gap: 8px;
  }
  .step-label .n{
    display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px;
    border-radius:50%; background: var(--hojicha-deep); color: var(--card); font-size:12px; font-weight:700;
  }

  .grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .grid.drink-grid{ grid-template-columns: 1fr; }
  .tab-bar-fixed{
    position: fixed; left:0; right:0; bottom:0; z-index: 50;
    background: var(--card);
    border-top: 1px solid var(--line);
    box-shadow: 0 -6px 18px rgba(43,32,22,0.10);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab-bar{
    max-width: 760px; margin: 0 auto; display:flex; gap: 8px;
  }
  .tab-btn{
    flex:1; background:none; border:none; cursor:pointer; font-family:'Noto Sans Thai', sans-serif;
    font-size: 12px; font-weight:600; color: var(--ink); opacity:0.5;
    padding: 10px 6px 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    border-top: 2px solid transparent;
  }
  .tab-btn.active{ opacity:1; color: var(--matcha-deep); border-top-color: var(--matcha-deep); }
  .tab-btn svg{ width:20px; height:20px; }
  .tab-count{
    font-family:'Noto Sans Thai', sans-serif; font-weight:700; font-size: 11px;
    background: var(--hojicha-deep); color: var(--card); border-radius: 999px; padding: 1px 7px;
  }

  .star-btn{
    position:absolute; top: 8px; right: 8px; width: 30px; height: 30px; border-radius: 50%;
    background: rgba(247,243,230,0.9); border: 1px solid var(--line); display:flex; align-items:center;
    justify-content:center; cursor:pointer; padding:0; z-index: 2;
  }
  .star-btn svg{ width:16px; height:16px; }
  .star-btn.active svg path{ fill: #d99a2b; stroke: #d99a2b; }
  .star-btn:not(.active) svg path{ fill: none; stroke: var(--ink); opacity:0.45; }
  .tile{
    position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 16px; cursor:pointer; text-align:left; font-family:'Noto Sans Thai', sans-serif;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .ticket{ position: relative; }
  .ticket .star-btn{ top: 20px; right: 20px; background: var(--paper); }
  .tile:hover{ transform: translateY(-2px); border-color: var(--matcha); box-shadow: 0 6px 16px rgba(63,74,31,0.12); }
  .tile .t-name{ font-family:'Noto Serif Thai', serif; font-weight:600; font-size: 16.5px; color: var(--ink); display:block; margin-bottom:3px; }
  .tile .t-sub{ font-size: 12px; opacity:0.5; }
  .tile .t-meta{ font-size: 12.5px; opacity:0.55; }
  .grid.cat-grid{ grid-template-columns: repeat(2, 1fr); }
  .tile.cat{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 10px; text-align:center; aspect-ratio: 1 / 1; padding: 14px;
  }
  .tile.cat .t-name{ margin-bottom:0; }
  .leaf-badge{ width: 38px; height:38px; border-radius: 50%; background: var(--matcha); display:flex;align-items:center;justify-content:center; flex:none; }
  .leaf-badge svg{ width:20px; height:20px; }

  .search-result-item{ display:flex; flex-direction:column; gap:2px; }
  .search-result-item .t-cat{ font-size: 11.5px; opacity:0.5; }
  mark{ background: rgba(92,107,47,0.28); color: inherit; border-radius: 3px; padding: 0 1px; }

  .dial-row{ display:flex; flex-direction:column; gap:10px; }
  .dial-btn{
    display:flex; align-items:center; gap:14px; background: var(--card); border:1px solid var(--line);
    border-radius: 14px; padding: 12px 16px; cursor:pointer; text-align:left; font-family:'Noto Sans Thai', sans-serif;
    transition: border-color .15s ease, transform .15s ease;
  }
  .dial-btn:hover{ border-color: var(--clay); transform: translateY(-1px); }
  .dial-btn.disabled{ opacity: 0.4; cursor: default; }
  .dial-btn.disabled:hover{ transform:none; border-color: var(--line); }
  .cup{ flex:none; width: 38px; height: 44px; }
  .cup svg{ width:100%; height:100%; display:block; }
  .dial-info{ flex:1; }
  .dial-pct{ font-family:'Noto Serif Thai', serif; font-weight:700; font-size: 16px; color: var(--hojicha-deep); }
  .dial-name{ font-size: 12.5px; opacity:0.6; }
  .dial-unavail{ font-size: 11.5px; color: var(--clay); }

  .ticket{ background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 26px 22px 22px; position: relative; overflow:hidden; }
  .ticket::before{
    content:""; position:absolute; top:0; left:0; right:0; height:5px;
    background: repeating-linear-gradient(90deg, var(--matcha) 0 14px, var(--hojicha) 14px 28px); opacity:0.8;
  }
  .ticket h2{ font-family:'Noto Serif Thai', serif; font-size: 22px; margin: 6px 0 2px; color: var(--ink); }
  .ticket .name-sub{ font-size: 13px; opacity:0.5; margin-bottom: 4px; }
  .ticket .pct-tag{
    display:inline-block; margin-top:6px; font-size: 13px; font-weight:700; color: var(--card);
    background: var(--matcha-deep); padding: 3px 12px; border-radius: 999px;
  }
  .ing-title{ font-family:'Noto Serif Thai', serif; font-size: 14.5px; font-weight:600; color: var(--hojicha-deep); margin: 18px 0 10px; }
  ul.ings{ list-style:none; margin:0 0 6px; padding:0; display:flex; flex-direction:column; gap: 8px; }
  ul.ings li{
    display:flex; align-items:center; justify-content:space-between; gap: 12px; padding: 10px 14px;
    background: var(--paper); border-radius: 10px; border: 1px solid var(--line);
  }
  ul.ings li .lbl{ font-size:14.5px; }
  ul.ings li .val{ font-weight:700; font-family:'Noto Serif Thai', serif; color: var(--matcha-deep); white-space:normal; text-align:right; max-width: 55%; }
  ul.ings li.override .val{ color: var(--clay); }
  ul.ings li.flagged{ border-color: var(--warn); background: #f7e9e5; }
  ul.ings li.flagged .val{ color: var(--warn); }
  ul.ings li.note-row{ background: transparent; border-style: dashed; }
  ul.ings li.note-row .lbl{ font-style: italic; opacity: 0.75; }
  .empty-note{ font-size: 14px; opacity: 0.65; padding: 30px 10px; text-align:center; }
  .no-attrs-note{ font-size: 13.5px; opacity: 0.55; font-style: italic; margin: 4px 0 0; }

  .back-row{ margin-top: 18px; display:flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .back-btn{

    .grid{ grid-template-columns: 1fr; }

<script>
const DATA = JSON.parse(document.getElementById('cafe-data').textContent);
document.getElementById('disclaimer').textContent = '⚠ ' + DATA.disclaimer;

let state = { category: null, drink: null, sweet: null, globalQuery: '', tab: 'categories' };

// ---- favorites (personal to this browser/device, star toggle) ----
let favorites = []; // array of {category, name}
let favoritesLoaded = false;
function favId(drink){ return (drink.category||'') + '||' + (drink.displayName || drink.name); }
function isFavorite(drink){ const id = favId(drink); return favorites.some(f => f.id === id); }
async function loadFavorites(){
  try{
    if(!window.storage) throw new Error('no storage');
    const res = await window.storage.get('favorites_list', false);
    favorites = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    favorites = [];
  }
  favoritesLoaded = true;
}
async function persistFavorites(){
  try{
    if(!window.storage) throw new Error('no storage');
    await window.storage.set('favorites_list', JSON.stringify(favorites), false);
  }catch(e){ /* ignore, stays in-memory for this session */ }
}
function toggleFavorite(drink){
  const id = favId(drink);
  const idx = favorites.findIndex(f => f.id === id);
  if(idx >= 0){
    favorites.splice(idx, 1);
  }else{
    favorites.push({ id, category: drink.category, name: drink.displayName || drink.name });
  }
  persistFavorites();
}
function starBtnHtml(drink, extraClass){
  const active = isFavorite(drink);
  return `<button class="star-btn ${active ? 'active' : ''} ${extraClass||''}" data-fav-toggle title="${active ? 'เอาออกจากรายการโปรด' : 'เพิ่มในรายการโปรด'}">
    <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.4 6.9.7-5.2 4.7 1.6 6.9L12 17.6l-6.2 3.6 1.6-6.9-5.2-4.7 6.9-.7L12 2.5Z" stroke-width="1.6" stroke-linejoin="round"/></svg>
  </button>`;
}
function attachStarHandler(container, drink){
  const btn = container.querySelector('[data-fav-toggle]');
  if(!btn) return;
  btn.onclick = (e) => {
    e.stopPropagation();
    toggleFavorite(drink);
    btn.classList.toggle('active');
    btn.title = btn.classList.contains('active') ? 'เอาออกจากรายการโปรด' : 'เพิ่มในรายการโปรด';
    if(state.tab === 'favorites') renderStage(); // refresh list if currently viewing favorites
    renderTabBar();
  };
}

// ---- shared note storage (per-drink, visible to everyone using this app) ----
const noteCache = {};
function slugKey(s){ return (s||'').toString().replace(/[\/\\'"]/g,'').replace(/\s+/g,'_').slice(0,80); }
function noteKey(drink){ return `note__${slugKey(drink.category)}__${slugKey(drink.displayName || drink.name)}`; }
async function loadNote(drink){
  const key = noteKey(drink);
  if(key in noteCache) return noteCache[key];
  try{
    if(!window.storage) throw new Error('no storage');
    const res = await window.storage.get(key, true);
    const val = res ? res.value : '';
    noteCache[key] = val;
    return val;
  }catch(e){
    noteCache[key] = '';
    return '';
  }
}
async function saveNote(drink, text){
  const key = noteKey(drink);
  noteCache[key] = text;
  try{
    if(!window.storage) throw new Error('no storage');
    await window.storage.set(key, text, true);
    return true;
  }catch(e){
    return false;
  }
}

// ---- fuzzy search helpers (typo-tolerant) ----
function normText(s){ return (s||'').toString().toLowerCase().trim(); }
function editDistance(a, b){
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  let prev = new Array(n+1);
  let cur = new Array(n+1);
  for(let j=0;j<=n;j++) prev[j] = j;
  for(let i=1;i<=m;i++){
    cur[0] = i;
    for(let j=1;j<=n;j++){
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    [prev, cur] = [cur, prev];
  }
  return prev[n];
}
function fuzzyThreshold(len){ return len<=3 ? 1 : (len<=6 ? 2 : 3); }
// returns best (lowest) distance-like score for query against text, or Infinity if no reasonable match
function fuzzyScore(query, text){
  query = normText(query); text = normText(text);
  if(!query || !text) return Infinity;
  if(text.includes(query)) return 0;
  const threshold = fuzzyThreshold(query.length);
  let best = Infinity;
  const words = text.split(/\s+/).filter(Boolean);
  for(const w of words){
    const d = editDistance(query, w);
    if(d <= threshold && d < best) best = d;
    if(w.length > query.length){
      for(let i=0; i<=w.length-query.length; i++){
        const sub = w.slice(i, i+query.length);
        const d2 = editDistance(query, sub);
        if(d2 <= threshold && d2 < best) best = d2;
      }
    }
  }
  const dWhole = editDistance(query, text);
  if(dWhole <= threshold+1 && dWhole < best) best = dWhole;
  return best;
}
function fuzzyMatch(query, text){ return fuzzyScore(query, text) !== Infinity; }

}

function renderCrumbs(){
  const parts = [];
  const rootLabel = state.tab === 'favorites' ? 'รายการโปรด' : (state.tab === 'search' ? 'ค้นหา' : 'หมวดหมู่');
  parts.push(crumbBtn(rootLabel, state.category === null, () => goTo(0)));
  if(state.category){
    parts.push('<span class="sep">›</span>');
    parts.push(crumbBtn(state.category, state.drink === null, () => goTo(1)));
  }
  if(state.drink){
    parts.push('<span class="sep">›</span>');
    parts.push(crumbBtn(state.drink.displayName || state.drink.name, !(state.drink.hasSweetness && state.sweet === null) && state.sweet===null, () => goTo(2)));
  }
  if(state.sweet){
    parts.push('<span class="sep">›</span>');
    parts.push(crumbBtn(state.sweet, true, null, true));
  }
  crumbs.innerHTML = parts.join('');
}
function crumbBtn(label, isActive, onClick, disabledLook){
  const cls = isActive ? 'active' : '';
  return `<button class="${cls}" data-nav="${label.replace(/"/g,'&quot;')}">${label}</button>`;
}
crumbs.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-nav]');
  if(!btn) return;
  const label = btn.getAttribute('data-nav');
  if(label === 'หมวดหมู่' || label === 'รายการโปรด' || label === 'ค้นหา'){ goTo(0); return; }
  if(state.category && label === state.category){ goTo(1); return; }
  if(state.drink && label === (state.drink.displayName || state.drink.name)){ goTo(2); return; }
});

function goTo(level){
  const tab = state.tab;
  if(level === 0){ state = { category:null, drink:null, sweet:null, globalQuery:'', tab }; }
  if(level === 1){ state.drink = null; state.sweet = null; state.globalQuery = ''; }
  if(level === 2){ state.sweet = null; state.globalQuery = ''; }
  render();
}
function goHome(){
  state = { category:null, drink:null, sweet:null, globalQuery:'', tab: 'categories' };
  render();
}

function renderSearchBox(){
  return `<input class="search" id="tab-search" type="text" autofocus inputmode="search" placeholder="ค้นหาเมนู... (พิมพ์ผิดก็หาเจอ) — ค้นได้ทุกหมวดหมู่">`;
}
function wireSearchBox(){
  const el = document.getElementById('tab-search');
  if(!el) return;
  el.value = state.globalQuery || '';
  el.oninput = (e) => {
    state.globalQuery = e.target.value;
    // Update only the results list on each keystroke — do NOT rebuild the
    // input itself (that used to cause the mobile keyboard to stutter/
    // flicker on every character, since the <input> was destroyed and
    // recreated each time via a full renderStage()/renderSearchTab() call).
    const results = document.getElementById('search-results');
    if(results) renderSearchResultsInto(results);
  };
  // focus once when the search tab is first opened
  el.focus();
}

      หมวดหมู่เมนู
    </button>
    <button class="tab-btn ${state.tab==='favorites' ? 'active' : ''}" id="tab-favorites">
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.4 6.9.7-5.2 4.7 1.6 6.9L12 17.6l-6.2 3.6 1.6-6.9-5.2-4.7 6.9-.7L12 2.5Z" fill="currentColor"/></svg>
      รายการโปรด ${favCount ? `<span class="tab-count">${favCount}</span>` : ''}
    </button>
    <button class="tab-btn ${state.tab==='search' ? 'active' : ''}" id="tab-search-btn">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      ค้นหา
    </button>`;
  document.getElementById('tab-categories').onclick = () => {
    state = { category:null, drink:null, sweet:null, globalQuery:'', tab: 'categories' };
    render();
  };
  document.getElementById('tab-favorites').onclick = () => {
    state = { category:null, drink:null, sweet:null, globalQuery:'', tab: 'favorites' };
    render();
  };
  document.getElementById('tab-search-btn').onclick = () => {
    state = { category:null, drink:null, sweet:null, globalQuery:'', tab: 'search' };
    render();
  };
}

function render(){
  renderTabBar();
  renderCrumbs();
  renderStage();
}

function renderStage(){
  if(!state.category){
    if(state.tab === 'favorites'){ renderFavorites(); }
    else if(state.tab === 'search'){ renderSearchTab(); }
    else { renderCategories(); }
    return;
  }
  if(!state.drink){ renderDrinks(); return; }
  if(state.drink.hasSweetness && !state.sweet){ renderSweetness(); return; }
  renderRecipe();
}

function renderSearchTab(){
  stage.innerHTML = `
    <div class="panel">
      <div class="step-label"><span class="n">⌕</span>ค้นหาเมนู</div>
      ${renderSearchBox()}
      <div id="search-results"></div>
    </div>`;
  wireSearchBox();
  renderSearchResultsInto(document.getElementById('search-results'));
}

function renderSearchResultsInto(container){
  const q = (state.globalQuery || '').trim();
  if(!q){
    container.innerHTML = `<div class="no-results">พิมพ์ชื่อเมนูด้านบนเพื่อค้นหา — ค้นได้ทุกหมวดหมู่ แม้พิมพ์ผิดก็หาเจอ</div>`;
    return;
  }
  const scored = [];
  getAllDrinks().forEach(({drink, categoryName}) => {
    const s1 = fuzzyScore(q, drink.name);
    const s2 = fuzzyScore(q, drink.nameSub || '');
    const s3 = fuzzyScore(q, categoryName);
    const best = Math.min(s1, s2, s3 + 1);
    if(best !== Infinity){
      scored.push({ drink, categoryName, score: best });
    }
  });
  scored.sort((a,b) => a.score - b.score);

  if(scored.length === 0){
    container.innerHTML = `<div class="no-results">ไม่พบเมนูที่ค้นหา ลองพิมพ์คำอื่นดูนะ</div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'grid drink-grid';
  scored.slice(0, 40).forEach(({drink, categoryName}) => {
    const el = document.createElement('div');
    el.className = 'tile';
    el.tabIndex = 0;
    el.innerHTML = `
      <div class="search-result-item">
        <span class="t-name">${drink.displayName || drink.name}</span>
        ${drink.nameSub ? `<span class="t-sub">${drink.nameSub}</span>` : ''}
        <span class="t-cat">${categoryName}</span>
      </div>
      ${starBtnHtml(drink)}`;
    el.onclick = () => {
      state.category = categoryName; state.drink = drink; state.globalQuery = ''; state.tab = 'categories';
      render();
    };
    attachStarHandler(el, drink);
    grid.appendChild(el);
  });
  container.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'step-label';
  label.style.marginTop = '4px';
  label.textContent = `ผลการค้นหา (${scored.length} รายการ)`;
  container.appendChild(label);
  container.appendChild(grid);
}

function renderFavorites(){
  if(favorites.length === 0){
    stage.innerHTML = `<div class="panel">
      <div class="step-label"><span class="n">★</span>รายการโปรด</div>
      <div class="no-results">ยังไม่มีเมนูโปรด — กดไอคอนดาว ★ ที่เมนูไหนก็ได้เพื่อเพิ่มมาไว้ที่นี่</div>
    </div>`;
    return;
  }
  const drinksById = {};
  getAllDrinks().forEach(({drink, categoryName}) => { drinksById[favId(drink)] = { drink, categoryName }; });
  stage.innerHTML = `
    <div class="panel">
      <div class="step-label"><span class="n">★</span>รายการโปรด</div>
      <div class="grid drink-grid" id="fav-grid"></div>
    </div>`;
  const grid = document.getElementById('fav-grid');
  favorites.forEach(f => {
    const found = drinksById[f.id];
    if(!found) return;
    const { drink, categoryName } = found;
    const el = document.createElement('div');
    el.className = 'tile';
    el.tabIndex = 0;
    el.innerHTML = `
      <div class="search-result-item">
        <span class="t-name">${drink.displayName || drink.name}</span>
        ${drink.nameSub ? `<span class="t-sub">${drink.nameSub}</span>` : ''}
        <span class="t-cat">${categoryName}</span>
      </div>
      ${starBtnHtml(drink)}`;
    el.onclick = () => { state.category = categoryName; state.drink = drink; state.tab = 'categories'; render(); };
    attachStarHandler(el, drink);
    grid.appendChild(el);
  });
}

let ALL_DRINKS = null;
function getAllDrinks(){
  if(ALL_DRINKS) return ALL_DRINKS;
  ALL_DRINKS = [];
  DATA.categories.forEach(cat => {
    cat.drinks.forEach(d => ALL_DRINKS.push({ drink: d, categoryName: cat.name }));
  });
  return ALL_DRINKS;
}

function renderCategories(){
  stage.innerHTML = `
    <div class="panel">
      <div class="step-label"><span class="n">1</span>เลือกหมวดหมู่</div>
      <div class="grid cat-grid" id="cat-grid"></div>
    </div>`;
  const grid = document.getElementById('cat-grid');
  DATA.categories.forEach(cat => {
    const el = document.createElement('button');
    el.className = 'tile cat';
    el.innerHTML = `
      <div class="leaf-badge">${leafIcon()}</div>
      <div>
        <span class="t-name">${cat.name}</span>
        <span class="t-meta">${cat.drinks.length} เมนู</span>
      </div>`;
    el.onclick = () => { state.category = cat.name; render(); };
    grid.appendChild(el);
  });
}

function currentCategoryDrinks(){
  const cat = DATA.categories.find(c => c.name === state.category);
  return cat ? cat.drinks : [];
}

function renderDrinks(){
  stage.innerHTML = `
    <div class="panel">
      <div class="step-label"><span class="n">2</span>เลือกเครื่องดื่ม</div>
      <div class="grid drink-grid" id="drink-grid"></div>
      <div class="back-row">
        <button class="back-btn" id="back0">‹ กลับไปเลือกหมวดหมู่</button>
        <button class="back-btn home-btn" id="home0">⌂ กลับหน้าหลัก</button>
      </div>
    </div>`;
  document.getElementById('back0').onclick = () => goTo(0);
  document.getElementById('home0').onclick = goHome;
  renderDrinkList();
}

function renderDrinkList(){
  const grid = document.getElementById('drink-grid');
  grid.innerHTML = '';
  const list = currentCategoryDrinks();
  if(list.length === 0){
    grid.innerHTML = '<div class="no-results">ไม่มีเมนูในหมวดนี้</div>';
    return;
  }
  list.forEach(d => {
    const el = document.createElement('div');
    el.className = 'tile';
    el.tabIndex = 0;
    el.innerHTML = `
      <span class="t-name">${d.displayName || d.name}</span>
      ${d.nameSub ? `<span class="t-sub">${d.nameSub}</span>` : ''}
      ${starBtnHtml(d)}`;
    el.onclick = () => { state.drink = d; render(); };
    attachStarHandler(el, d);
    grid.appendChild(el);
  });
}

const SWEET_ORDER = ["125% (เพิ่มหวาน)","100% (หวานปกติ)","50% (หวานน้อย)","25% (หวานน้อยมาก)","0% (ไม่หวาน)"];
const SWEET_FILL = {
  "125% (เพิ่มหวาน)": 1, "100% (หวานปกติ)": 0.8, "50% (หวานน้อย)": 0.5,
  "25% (หวานน้อยมาก)": 0.25, "0% (ไม่หวาน)": 0.05
};

function renderSweetness(){
  stage.innerHTML = `
    <div class="panel">
      <div class="step-label"><span class="n">3</span>เลือกระดับความหวาน</div>
      <div class="dial-row" id="dial-row"></div>
      <div class="back-row">
        <button class="back-btn" id="back1">‹ กลับไปเลือกเครื่องดื่ม</button>
        <button class="back-btn home-btn" id="home1">⌂ กลับหน้าหลัก</button>
      </div>
    </div>`;
  document.getElementById('back1').onclick = () => goTo(1);
  document.getElementById('home1').onclick = goHome;
  const row = document.getElementById('dial-row');
  const levels = Object.keys(state.drink.sweetness);
  const ordered = SWEET_ORDER.filter(l => levels.includes(l)).concat(levels.filter(l => !SWEET_ORDER.includes(l)));
  ordered.forEach(level => {
    const info = state.drink.sweetness[level];
    const avail = info && info.available;
    const el = document.createElement('button');
    el.className = 'dial-btn' + (avail ? '' : ' disabled');
    el.innerHTML = `
      <div class="cup">${cupIcon(SWEET_FILL[level] ?? 0.5)}</div>
      <div class="dial-info">
        <div class="dial-pct">${level}</div>
        ${avail ? '' : `<div class="dial-unavail">${(info && info.note) || 'ไม่มีสูตรระดับนี้'}</div>`}
      </div>`;
    if(avail){
      el.onclick = () => { state.sweet = level; render(); };
    } else {
      el.disabled = true;
    }
    row.appendChild(el);
  });
}

function ingLi(ing){
  const cls = ['override','flagged'].filter(c => (c==='override' && ing.override) || (c==='flagged' && ing.flagged)).join(' ');
  return `<li class="${cls}"><span class="lbl">${ing.label}</span><span class="val">${ing.text}</span></li>`;
}

function renderRecipe(){
  const d = state.drink;
  let sweetHtml = '';
  if(d.hasSweetness){
    const info = d.sweetness[state.sweet];
    if(info.ingredients && info.ingredients.length){
      sweetHtml = `<div class="ing-title">ส่วนผสมตามความหวาน</div><ul class="ings">${info.ingredients.map(ingLi).join('')}</ul>`;
    } else {
      sweetHtml = `<div class="empty-note">ไม่มีข้อมูลส่วนผสมสำหรับระดับความหวานนี้</div>`;
    }
  }

  let attrHtml = '';
  if(d.attributes && d.attributes.length){
    attrHtml = `<div class="ing-title">ส่วนผสม / ข้อมูลประจำเมนู</div><ul class="ings">${d.attributes.map(a => {
      const isNote = a.label.includes('หมายเหตุ');
      const cls = isNote ? 'note-row' : (a.flagged ? 'flagged' : '');
      return `<li class="${cls}"><span class="lbl">${a.label}</span><span class="val">${a.text}</span></li>`;
    }).join('')}</ul>`;
  } else if(!d.hasSweetness){
    attrHtml = `<p class="no-attrs-note">ไม่มีข้อมูลส่วนผสมเพิ่มเติมสำหรับเมนูนี้</p>`;
  }

  stage.innerHTML = `
    <div class="panel">
      <div class="ticket">
        ${starBtnHtml(d)}
        <h2>${d.displayName || d.name}</h2>
        ${d.nameSub ? `<div class="name-sub">${d.nameSub}</div>` : ''}
        ${d.hasSweetness ? `<span class="pct-tag">${state.sweet}</span>` : ''}
        ${attrHtml}
        ${sweetHtml}
        <div class="note-box">
          <div class="note-title">โน้ตเพิ่มเติม (เผื่อสูตรมีการเปลี่ยนแปลง) <span class="note-status" id="note-status">กำลังโหลด...</span></div>
          <textarea id="note-textarea" placeholder="พิมพ์โน้ตของเมนูนี้ไว้ที่นี่ เช่น ปรับสูตร วันที่ปรับ ฯลฯ — บันทึกอัตโนมัติ และทุกคนที่เปิดแอปนี้จะเห็นโน้ตเดียวกัน" disabled></textarea>
          <div class="note-hint">โน้ตนี้แชร์ร่วมกันทุกคนที่ใช้แอปนี้ และผูกกับเมนู+ระดับหมวดหมู่นี้โดยเฉพาะ</div>
        </div>
      </div>
      <div class="back-row">
        <button class="back-btn" id="back2">‹ ${d.hasSweetness ? 'เลือกความหวานอื่น' : 'กลับไปเลือกเครื่องดื่ม'}</button>
        <button class="back-btn home-btn" id="home2">⌂ กลับหน้าหลัก</button>
      </div>
    </div>`;
  document.getElementById('back2').onclick = () => { if(d.hasSweetness){ goTo(2); } else { goTo(1); } };
  document.getElementById('home2').onclick = goHome;
  attachStarHandler(stage, d);

  const ta = document.getElementById('note-textarea');
  const statusEl = document.getElementById('note-status');
  loadNote(d).then(val => {
    if(state.drink !== d) return; // user navigated away already
    ta.value = val || '';
    ta.disabled = false;
    statusEl.textContent = window.storage ? '' : '(ไม่สามารถบันทึกถาวรในเบราว์เซอร์นี้)';
  });
  let saveTimer = null;
  ta.addEventListener('input', () => {
    statusEl.textContent = 'กำลังพิมพ์...';
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      statusEl.textContent = 'กำลังบันทึก...';
      const ok = await saveNote(d, ta.value);
      if(state.drink !== d) return;
      statusEl.textContent = ok ? 'บันทึกแล้ว ✓' : 'บันทึกแบบชั่วคราว (เซสชันนี้เท่านั้น)';
    }, 700);
  });
}

(async function init(){
  await loadFavorites();
  render();
})();
</script>
</body>
</html>
